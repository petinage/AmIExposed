<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

    <!-- Background -->
    <rect width="512" height="512" rx="96" fill="#0F172A"/>

    <!-- Eye -->
    <path
        d="
            M64 256
            C128 160 192 120 256 120
            C320 120 384 160 448 256
            C384 352 320 392 256 392
            C192 392 128 352 64 256
            Z"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="22"
        stroke-linecap="round"
        stroke-linejoin="round"/>

    <!-- Radar Rings -->
    <circle
        cx="256"
        cy="256"
        r="78"
        fill="none"
        stroke="#3B82F6"
        stroke-width="10"/>

    <circle
        cx="256"
        cy="256"
        r="52"
        fill="none"
        stroke="#60A5FA"
        stroke-width="8"/>

    <circle
        cx="256"
        cy="256"
        r="26"
        fill="#FFFFFF"/>

    <!-- Radar Sweep -->
    <path
        d="
            M256 256
            L256 178
            A78 78 0 0 1 327 208
            Z"
        fill="#3B82F6"
        opacity="0.35"/>

    <!-- Crosshair -->
    <line
        x1="256"
        y1="170"
        x2="256"
        y2="342"
        stroke="#FFFFFF"
        stroke-width="4"
        opacity="0.4"/>

    <line
        x1="170"
        y1="256"
        x2="342"
        y2="256"
        stroke="#FFFFFF"
        stroke-width="4"
        opacity="0.4"/>

    <!-- Radar Dot -->
    <circle
        cx="300"
        cy="215"
        r="6"
        fill="#22C55E"/>

</svg>